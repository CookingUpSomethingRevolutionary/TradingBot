name: Scheduled Portfolio Rebalance

on:
  # 1. Automated Schedule: Every Monday at 9:30 AM EST (13:30 UTC)
  schedule:
    - cron: '30 13 * * 1'
  
  # 2. Manual Test Trigger: Provides a "Run workflow" button in the GitHub UI
  workflow_dispatch:

jobs:
  rebalance:
    name: Execute Live Rebalance Script
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Caches dependencies to make runs faster

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy alpaca-py

    - name: Run Rebalance Script
      # Pass your production Alpaca secrets securely into environmental variables
      env:
        ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
        ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      run: python bot.py
