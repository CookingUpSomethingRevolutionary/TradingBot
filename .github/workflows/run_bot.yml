name: Run Trading Bot Rebalance

on:
  schedule:
    # Runs every Monday at 14:30 UTC (9:30 AM EST)
    - cron: '30 14 * * 1'
  workflow_dispatch: # Allows you to manually click a button in GitHub to run the bot whenever you want

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python Engine
      uses: actions/setup-python@v5
      with:
        python-python: '3.10'
        cache: 'pip' # Optional optimization: caches pip dependencies

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install alpaca-trade-api pandas numpy

    - name: Execute Rebalance Script
      env:
        # Securely injects secrets from your GitHub Repository settings into the environment
        ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
        ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      run: python bot.py
